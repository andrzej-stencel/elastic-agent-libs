version: "2"
run:
  build-tags:
    - integration

# Find the whole list here https://golangci-lint.run/usage/linters/
linters:
  default: none
  enable:
    - asciicheck
    - bodyclose
    - depguard
    - durationcheck
    - errcheck
    - errorlint
    - forbidigo
    - gomoddirectives
    - gomodguard_v2
    - gosec
    - govet
    - importas
    - ineffassign
    - misspell
    - nakedret
    - nilerr
    - noctx
    - nolintlint
    - staticcheck
    - testifylint
    - unconvert
    - unused
    - wastedassign
  settings:
    depguard:
      rules:
        main:
          list-mode: lax
          deny:
            - pkg: math/rand$
              desc: superseded by math/rand/v2
            - pkg: golang.org/x/exp/maps$
              desc: superseded by maps
            - pkg: golang.org/x/exp/slices$
              desc: superseded by slices
    errcheck:
      check-type-assertions: true
      check-blank: false
      exclude-functions:
        - (github.com/elastic/elastic-agent-libs/mapstr.M).Delete
        - (github.com/elastic/elastic-agent-libs/mapstr.M).Put
        - github.com/elastic/elastic-agent-libs/logp.TestingSetup
        - github.com/elastic/elastic-agent-libs/logp.DevelopmentSetup
    errorlint:
      errorf: true
      asserts: true
      comparison: true
    forbidigo:
      forbid:
        - pattern: fmt.Print.* # too much log noise
      exclude-godoc-examples: true
    gomoddirectives:
      replace-local: false
    gomodguard_v2:
      blocked:
        - module: github.com/pkg/errors
          recommendations:
            - errors
            - fmt
          reason: This package is deprecated, use `fmt.Errorf` with `%w` instead
        - module: go.uber.org/multierr
          recommendations:
            - errors
          reason: This package is deprecated, use `errors.Join` instead
        - module: gotest.tools/v3
          recommendations:
            - github.com/stretchr/testify
          reason: Use one assertion library consistently across the codebase
        - module: github.com/google/uuid
          recommendations:
            - github.com/gofrs/uuid/v5
          reason: Use one uuid library consistently across the codebase
        - module: github.com/elastic/beats/v7
          reason: There must be no Beats dependency
    gosec:
      excludes:
        - G306 # Expect WriteFile permissions to be 0600 or less
        - G404 # Use of weak random number generator
        - G401 # Detect the usage of DES, RC4, MD5 or SHA1: Used in non-crypto contexts.
        - G501 # Import blocklist: crypto/md5: Used in non-crypto contexts.
        - G505 # Import blocklist: crypto/sha1: Used in non-crypto contexts.
    nolintlint:
      require-explanation: true
      require-specific: false
      allow-unused: false
    staticcheck:
      checks:
        - -ST1005
        - all
    testifylint:
      disable:
        - go-require # Disabled: too many false positives, can be used to exit a goroutine
        - require-error # Disabled: using assert for error checks lets the test continue, maximizing context on failure
  exclusions:
    generated: lax
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    rules:
      - linters:
          - staticcheck
        text: 'ST1003:'
      - linters:
          - forbidigo
        path: (.*magefile.go|.*dev-tools/mage/.*)
    paths:
      - third_party$
      - builtin$
      - examples$
issues:
  max-issues-per-linter: 0
  max-same-issues: 0

formatters:
  enable:
    - goimports
  settings:
    goimports:
      local-prefixes:
        - github.com/elastic
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
      - examples$
